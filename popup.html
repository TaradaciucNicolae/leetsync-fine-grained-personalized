<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/popup.css" />
    <title>SafeLeetSync</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="masthead">
        <h1>SafeLeetSync</h1>
        <p>Fine-Grained PAT sync for LeetCode</p>
      </header>

      <form id="config-form" autocomplete="off">
        <label for="username">
          GitHub owner
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            spellcheck="false"
            required
          />
        </label>

        <label for="repository">
          Repository
          <input
            id="repository"
            name="repository"
            type="text"
            autocomplete="off"
            spellcheck="false"
            value="leetcode-solutions"
            required
          />
        </label>

        <label for="token">
          Fine-Grained PAT
          <input
            id="token"
            name="token"
            type="password"
            autocomplete="off"
            spellcheck="false"
            placeholder="Paste your Fine-Grained PAT"
          />
        </label>

        <div class="actions">
          <button id="save-button" type="submit">Save configuration</button>
          <button id="test-button" type="button">Test GitHub Connection</button>
        </div>
      </form>

      <section class="status-panel" aria-live="polite">
        <p id="status-message"></p>
        <p id="repo-link"></p>
        <p id="last-sync"></p>
      </section>

      <button id="manual-sync-button" type="button">
        Sync Latest Accepted Solution
      </button>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
